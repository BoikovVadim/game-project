<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <title>Legend Games</title>
    <style>
      html, body { margin: 0; background: #f0f0f0; color: #222; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
      #root { min-height: 100vh; background: #f0f0f0; }
      * { -webkit-tap-highlight-color: transparent !important; }
    </style>
  </head>
  <body>
    <script>if (!window.location.hash || window.location.hash === '#') { window.location.hash = '#/'; }</script>
    <!-- Экран загрузки: sidebar адаптируется к ширине экрана, совпадая с реальным sidebar профиля -->
    <div id="loading-screen" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#f0f0f0;display:flex;transition:opacity .18s ease-out;">
      <div id="ls-sidebar" style="width:70px;min-height:100vh;background:#000;flex-shrink:0;border-right:1px solid #333;"></div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;">
        <div style="width:28px;height:28px;border:3px solid rgba(201,162,39,0.2);border-top-color:#d4af37;border-radius:50%;animation:ls-spin .8s linear infinite;"></div>
      </div>
      <style>
        @keyframes ls-spin{to{transform:rotate(360deg)}}
        @media(min-width:1200px){#ls-sidebar{width:140px;}}
        @media(min-width:1600px){#ls-sidebar{width:170px;}}
        @media(max-width:767px){#ls-sidebar{display:none!important;}}
      </style>
    </div>
    <script>(function(){var h=window.location.hash||'';var pub=h==='#/'||h.indexOf('#/?')===0||h.indexOf('#/about')===0||h.indexOf('#/offer')===0||h.indexOf('#/privacy')===0||h.indexOf('#/payment-terms')===0||h.indexOf('#/tournament-rules')===0||h.indexOf('#/balance-rules')===0||h.indexOf('#/contacts')===0||h.indexOf('#/register')===0||h.indexOf('#/login')===0;var noSidebar=pub||h.indexOf('#/admin')===0||h.indexOf('#/forgot')===0||h.indexOf('#/reset')===0||h.indexOf('#/verify')===0;if(noSidebar){var s=document.getElementById('ls-sidebar');if(s)s.style.display='none';}if(pub){var ls=document.getElementById('loading-screen');if(ls)ls.style.background='#111';document.body.style.background='#111';var r=document.getElementById('root');if(r)r.style.background='#111';}})();</script>
    <div id="root"></div>
    <noscript><p style="padding:24px;text-align:center;">Для работы сайта включите JavaScript.</p></noscript>
    <script>
      (function() {
        if (typeof window === 'undefined' || !/^https?:\/\/(localhost|127\.0\.0\.1)(:\d+)?(\/|$)/.test(window.location.href)) return;
        var last = null;
        setInterval(function() {
          fetch('/api/last-rebuild').then(function(r) { return r.text(); }).then(function(ts) {
            if (last === null) { last = ts || '0'; return; }
            if (ts && ts !== last) { last = ts; location.reload(); }
          }).catch(function() {});
        }, 2000);
      })();
    </script>
  </body>
</html>
